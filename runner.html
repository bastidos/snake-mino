<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RUNNER — Mino</title>
  <style>
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-ExtraLight.otf'); font-weight: 200; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-Light.otf');      font-weight: 300; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-Regular.otf');    font-weight: 400; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-Medium.otf');     font-weight: 500; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-SemiBold.otf');   font-weight: 600; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-Bold.otf');       font-weight: 700; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-ExtraBold.otf');  font-weight: 800; }
    @font-face { font-family: 'Epilogue'; src: url('fonts/Epilogue-Black.otf');      font-weight: 900; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime:   #92ED11;
      --black:  #171915;
      --gray:   #6b6e69;
      --white:  #eaeaea;
      --dark:   #1f221d;
      --border: #2a2d28;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Epilogue', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 24px 32px;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img { height: 36px; width: auto; display: block; }

    nav { display: flex; gap: 12px; }

    .nav-link {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray); text-decoration: none;
      padding: 6px 14px; border: 1px solid var(--border);
      font-family: 'Epilogue', sans-serif;
      transition: all 0.15s;
    }
    .nav-link:hover { color: var(--white); border-color: var(--gray); }
    .nav-link.active { color: var(--black); background: var(--lime); border-color: var(--lime); }

    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 180px;
    }

    .card {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 18px 20px;
    }

    .card-label {
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 6px;
    }

    .card-value {
      font-family: 'Epilogue', sans-serif;
      font-size: 2rem; font-weight: 800;
      color: var(--lime); line-height: 1;
    }
    .card-value.small { font-size: 1.3rem; }

    .avatar-card {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; transform: translateY(-6px);
      transition: opacity 0.35s, transform 0.35s;
    }
    .avatar-card.visible { opacity: 1; transform: translateY(0); }
    .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--lime); }
    .avatar-name { font-family: 'Epilogue', sans-serif; font-size: 0.95rem; font-weight: 800; color: var(--lime); }
    .avatar-label { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); margin-top: 2px; }

    .lb-card { background: var(--dark); border: 1px solid var(--border); padding: 18px 20px; flex: 1; }

    .lb-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-size: 0.6rem; font-weight: 700; color: var(--gray); width: 18px; }
    .lb-rank.gold { color: #FFD700; } .lb-rank.silver { color: #C0C0C0; } .lb-rank.bronze { color: #CD7F32; }
    .lb-name { flex: 1; padding: 0 8px; font-weight: 400; color: var(--white); font-size: 0.78rem; }
    .lb-row.current-player .lb-name { color: var(--lime); font-weight: 700; }
    .lb-score { font-family: 'Epilogue', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--lime); min-width: 28px; text-align: right; }
    .lb-score.zero { color: var(--gray); font-weight: 400; }

    .canvas-wrap {
      position: relative; border: 1px solid var(--border); line-height: 0; flex-shrink: 0;
    }
    .canvas-wrap::before {
      content: ''; position: absolute; inset: -1px;
      border: 1px solid transparent; pointer-events: none; transition: border-color 0.3s;
    }
    .canvas-wrap.playing::before { border-color: var(--lime); }
    canvas { display: block; }

    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10,10,10,0.94); text-align: center; padding: 20px;
      transition: opacity 0.4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-family: 'Epilogue', sans-serif; font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; margin-bottom: 6px;
    }
    .overlay-title span { color: var(--lime); }

    .overlay-sub {
      font-size: 0.72rem; font-weight: 300; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--gray); margin-bottom: 20px;
    }

    .player-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 7px; margin-bottom: 18px; width: 100%; max-width: 300px;
    }

    .player-btn {
      padding: 10px 4px; background: transparent; border: 1px solid var(--border);
      color: var(--gray); font-family: 'Epilogue', sans-serif; font-size: 0.75rem;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .player-btn:hover { border-color: var(--lime); color: var(--white); }
    .player-btn.selected { background: var(--lime); border-color: var(--lime); color: var(--black); }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px; background: var(--lime); color: var(--black);
      font-family: 'Epilogue', sans-serif; font-size: 0.8rem; font-weight: 800;
      letter-spacing: 0.2em; text-transform: uppercase; border: none; cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn-ghost {
      background: transparent; color: var(--lime); border: 1px solid var(--lime); margin-top: 8px;
    }

    .score-result { margin-bottom: 16px; padding: 12px 24px; border: 1px solid var(--border); }
    .score-result .label { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; }
    .score-result .val { font-family: 'Epilogue', sans-serif; font-size: 2.6rem; font-weight: 800; color: var(--lime); line-height: 1; }

    .new-record { font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--lime); margin-top: 4px; opacity: 0; transition: opacity 0.4s; }
    .new-record.show { opacity: 1; }

    footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 14px;
    }
    .footer-text { font-size: 0.65rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); }
    .footer-dot { width: 6px; height: 6px; background: var(--lime); border-radius: 50%; animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .controls-card { background: var(--dark); border: 1px solid var(--border); padding: 16px 20px; }
    .key-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 0.75rem; color: var(--gray); font-weight: 300; }
    .key { display: inline-flex; align-items: center; justify-content: center; min-width: 26px; height: 26px; padding: 0 4px; border: 1px solid var(--border); font-family: 'Epilogue', sans-serif; font-size: 0.6rem; font-weight: 700; color: var(--white); background: #1a1a1a; flex-shrink: 0; }

    /* MOBILE */
    @media (max-width: 800px) {
      .layout { padding: 12px 16px; gap: 10px; }
      .sidebar { display: none; }
      .main { gap: 0; }
    }
  </style>
</head>
<body>

<div class="layout">

  <header>
    <div class="logo"><img src="LOGO_MINO_VERT.png" alt="Mino" /></div>
    <nav>
      <a href="index.html"   class="nav-link">Snake</a>
      <a href="shooter.html" class="nav-link">Shooter</a>
      <a href="runner.html"  class="nav-link active">Runner</a>
    </nav>
  </header>

  <div class="main">

    <!-- LEFT -->
    <div class="sidebar">
      <div class="card">
        <div class="card-label">Score</div>
        <div class="card-value" id="scoreDisplay">0</div>
      </div>
      <div class="card">
        <div class="card-label">Record</div>
        <div class="card-value small" id="bestDisplay">0</div>
      </div>
      <div class="card">
        <div class="card-label">Vitesse</div>
        <div class="card-value small" id="speedDisplay">×1</div>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="startOverlay">
        <div class="overlay-title">RUN<span>NER</span></div>
        <div class="overlay-sub">Saute par-dessus les gobelins</div>
        <div class="player-grid" id="playerGrid">
          <button class="player-btn" data-name="Aminata">Aminata</button>
          <button class="player-btn" data-name="Inès">Inès</button>
          <button class="player-btn" data-name="Maé">Maé</button>
          <button class="player-btn" data-name="Luna">Luna</button>
          <button class="player-btn" data-name="Bastien">Bastien</button>
          <button class="player-btn" data-name="Anatole">Anatole</button>
          <button class="player-btn" data-name="Rebecca" style="grid-column:2">Rebecca</button>
        </div>
        <button class="btn" id="startBtn" disabled>Courir →</button>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-title">GAME<span> OVER</span></div>
        <div class="overlay-sub">Écrasé par un gobelin</div>
        <div class="score-result">
          <div class="label">Score final</div>
          <div class="val" id="finalScore">0</div>
          <div class="new-record" id="newRecord">★ Nouveau record</div>
        </div>
        <button class="btn" id="restartBtn">Rejouer →</button>
        <button class="btn btn-ghost" id="menuBtn">Menu</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="sidebar">
      <div class="avatar-card" id="avatarCard">
        <img class="avatar-img" id="avatarImg" src="" alt="" />
        <div>
          <div class="avatar-name" id="avatarName"></div>
          <div class="avatar-label">En course</div>
        </div>
      </div>
      <div class="lb-card">
        <div class="card-label">Leaderboard</div>
        <div id="lbList"></div>
      </div>
      <div class="controls-card">
        <div class="card-label" style="margin-bottom:10px">Contrôles</div>
        <div class="key-row"><div class="key">SPC</div> Sauter</div>
        <div class="key-row"><div class="key">↑</div> Double saut</div>
        <div class="key-row"><div class="key">↓</div> Écraser</div>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-text">© 2026 Mino Creative Studio</div>
    <div class="footer-dot"></div>
    <div class="footer-text">All rights reserved</div>
  </footer>

</div>

<script>
  // ── CONFIG ───────────────────────────────────────────────
  const W = 500, H = 280;
  const GROUND_Y = H - 55;
  const GRAVITY  = 0.55;
  const JUMP_VEL = -12.5;
  const PLAYER_X = 72;
  const PLAYER_R = 20;
  const LIME  = '#92ED11';
  const BLACK = '#171915';

  const PLAYERS = ['Aminata', 'Inès', 'Maé', 'Luna', 'Bastien', 'Anatole', 'Rebecca'];
  const AVATARS = {
    'Aminata':'aminata.png','Inès':'ines.png','Maé':'mae.png',
    'Luna':'luna.png','Bastien':'bastien.png','Anatole':'anatole.png','Rebecca':'rebecca.png',
  };
  const LB_KEY_PARAM = 'runner';

  // ── DOM ──────────────────────────────────────────────────
  const canvas     = document.getElementById('gameCanvas');
  const ctx        = canvas.getContext('2d');
  const wrap       = document.getElementById('canvasWrap');
  const startOvl   = document.getElementById('startOverlay');
  const gameOvl    = document.getElementById('gameOverOverlay');
  const startBtn   = document.getElementById('startBtn');
  const restBtn    = document.getElementById('restartBtn');
  const menuBtn    = document.getElementById('menuBtn');
  const scoreDsp   = document.getElementById('scoreDisplay');
  const bestDsp    = document.getElementById('bestDisplay');
  const speedDsp   = document.getElementById('speedDisplay');
  const finalScr   = document.getElementById('finalScore');
  const newRec     = document.getElementById('newRecord');
  const lbList     = document.getElementById('lbList');
  const avatarCard = document.getElementById('avatarCard');
  const avatarImg  = document.getElementById('avatarImg');
  const avatarName = document.getElementById('avatarName');

  canvas.width  = W;
  canvas.height = H;

  const gobelinImg = new Image();
  gobelinImg.src = 'gobelin.png';

  // ── BACKGROUND GENERATION ────────────────────────────────
  // Stars
  const STARS = Array.from({length: 60}, () => ({
    x: Math.random() * W,
    y: 8 + Math.random() * (GROUND_Y * 0.68),
    r: 0.3 + Math.random() * 1.1,
    a: 0.08 + Math.random() * 0.28,
  }));

  // Building layers: pre-generate, tiled for infinite scroll
  function genLayer(n, minW, maxW, minH, maxH) {
    const list = []; let totalW = 0;
    for (let i = 0; i < n; i++) {
      const w = minW + Math.floor(Math.random() * (maxW - minW));
      const h = minH + Math.floor(Math.random() * (maxH - minH));
      // pre-bake window positions (flat: [wx,wy, wx,wy, ...])
      const wins = [];
      if (h > 22) {
        for (let wy = 7; wy < h - 5; wy += 10) {
          for (let wx = 3; wx < w - 2; wx += 7) {
            if (Math.random() > 0.42) { wins.push(wx); wins.push(wy); }
          }
        }
      }
      list.push({ x: totalW, w, h, wins });
      totalW += w + 1 + Math.floor(Math.random() * 6);
    }
    return { list, totalW: totalW || 1 };
  }

  const L_FAR = genLayer(28, 5, 20, 10, 42);
  const L_MID = genLayer(18, 12, 38, 22, 78);

  let farOff = Math.random() * L_FAR.totalW;
  let midOff = Math.random() * L_MID.totalW;
  let gndOff = 0;

  function drawLayer(layer, off, fill, winFill) {
    const { list, totalW } = layer;
    const t0 = -(off % totalW);                   // always ≤ 0
    for (let tx = t0; tx < W; tx += totalW) {
      ctx.fillStyle = fill;
      for (const b of list) {
        const bx = tx + b.x;
        if (bx + b.w < 0 || bx > W) continue;
        ctx.fillRect(bx, GROUND_Y - b.h, b.w, b.h);
      }
      ctx.fillStyle = winFill;
      for (const b of list) {
        const bx = tx + b.x;
        if (bx + b.w < 0 || bx > W) continue;
        for (let j = 0; j < b.wins.length; j += 2) {
          ctx.fillRect(bx + b.wins[j], GROUND_Y - b.h + b.wins[j + 1], 2, 3);
        }
      }
    }
  }

  function drawBackground() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#0d1210');
    sky.addColorStop(1, '#171915');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Stars
    for (const s of STARS) {
      ctx.fillStyle = `rgba(220,235,210,${s.a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Building layers
    drawLayer(L_FAR, farOff, 'rgba(22,34,18,0.6)', 'rgba(146,237,17,0.035)');
    drawLayer(L_MID, midOff, 'rgba(14,22,11,0.88)', 'rgba(146,237,17,0.07)');

    // Ground strip
    ctx.fillStyle = '#171915';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // Ground glow line
    ctx.shadowColor = LIME;
    ctx.shadowBlur  = 8;
    ctx.strokeStyle = 'rgba(146,237,17,0.4)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
    ctx.shadowBlur = 0;

    // Scrolling dashes on ground
    ctx.fillStyle = 'rgba(146,237,17,0.1)';
    const dw = 20, dg = 26;
    const d0 = -(gndOff % (dw + dg));
    for (let x = d0; x < W; x += dw + dg) ctx.fillRect(x, GROUND_Y + 5, dw, 2);

    ctx.fillStyle = 'rgba(146,237,17,0.04)';
    const d0b = -(gndOff * 0.35 % (dw * 2 + dg));
    for (let x = d0b; x < W; x += dw * 2 + dg) ctx.fillRect(x, GROUND_Y + 12, dw * 2, 1);
  }

  // ── CREATURE DRAWING (pixel-art style) ──────────────────
  // Origin = player collision center (cx, cy).
  // Visual: spikes from y=-40 to feet at y=+24 (touches GROUND_Y).
  function drawCreature(cx, cy, phase, ducking, squishX, squishY) {
    ctx.save();
    ctx.translate(Math.round(cx), Math.round(cy));
    ctx.scale(squishX, squishY);

    const P = 2;  // px per pixel unit
    function px(x, y, w, h, col) {
      ctx.fillStyle = col;
      ctx.fillRect(x * P, y * P, Math.max(P, w * P), Math.max(P, h * P));
    }

    // Palette (from image)
    const K  = '#101610';  // dark outline
    const G  = '#46a034';  // main green
    const gD = '#2a6420';  // dark green
    const gL = '#74cc52';  // light green spots
    const CR = '#d8be76';  // cream/beige (belly, horns)
    const cL = '#ece4b0';  // light cream (spike tips)
    const BR = '#6a2e1c';  // brown (pants)
    const WH = '#e4e0c8';  // off-white (shoes)
    const YE = '#f0be22';  // yellow (eyes)
    const TL = '#1c6642';  // tail teal

    // Alternating legs while running
    const lA = ducking ? 0 : Math.sin(phase * 2.6) * 1.8;
    const lB = -lA;

    // ── BACK ELEMENTS ───────────────────────────────────
    // Tail (right side, goes up-right)
    px(7, -7, 2, 2, TL);
    px(8, -5, 2, 3, TL);
    px(7, -3, 2, 2, TL);
    px(8, -2, 1, 1, gD);

    // Left arm (behind body)
    px(-10, -2, 2, 6, gD);

    // ── BODY OUTLINE (solid bg slightly bigger) ──────────
    px(-9, -14, 19, 26, K);

    // ── MAIN GREEN BODY ──────────────────────────────────
    px(-8, -13, 17, 24, G);
    // Round off top corners
    px(-8, -13, 2, 1, K);
    px( 7, -13, 2, 1, K);
    // Round off bottom corners
    px(-8,  10, 2, 1, K);
    px( 7,  10, 1, 1, K);
    // Side shading
    px(-8,  -5, 1, 8, gD);
    px( 8,  -7, 1, 9, gD);

    // ── GREEN SPOTS / TEXTURE ────────────────────────────
    px(-4, -12, 2, 2, gL);
    px( 1, -11, 2, 2, gL);
    px(-1,  -7, 2, 2, gL);
    px( 3,  -5, 2, 2, gL);
    px(-5,  -4, 2, 1, gD);
    px( 4,  -9, 1, 1, gD);
    px(-2, -10, 1, 1, gD);

    // ── BELLY (cream, lower-center) ───────────────────────
    px(-5, -4, 10, 11, CR);
    px(-4, -5,  8,  1, cL);   // lighter top edge
    px(-6,  0, 12,  5, CR);   // wider mid band
    px(-4,  7,  8,  1, gD);   // shadow under belly

    // ── BROWN PANTS ──────────────────────────────────────
    px(-7,  6, 15, 5, BR);
    px(-6,  5, 13, 2, BR);    // soft upper edge

    // ── LEGS ─────────────────────────────────────────────
    px(-5 + lA, 10, 3, 3, gD);
    px( 2 + lB, 10, 3, 3, gD);

    // ── SHOES ────────────────────────────────────────────
    px(-6 + lA, 12, 5, 2, WH);
    px( 1 + lB, 12, 5, 2, WH);
    px(-6 + lA, 13, 5, 1, K);
    px( 1 + lB, 13, 5, 1, K);

    // ── FRONT RIGHT ARM ──────────────────────────────────
    px(9,  -2, 2, 7, gD);
    px(10, -4, 1, 3, gD);

    // ── HEAD TOP ─────────────────────────────────────────
    px(-6, -14, 13, 2, G);
    px(-5, -15, 11, 2, G);

    // ── SPIKES / HORNS ───────────────────────────────────
    // Left spike (leans left)
    px(-6, -19, 2, 2, cL);
    px(-5, -18, 2, 2, cL);
    px(-4, -17, 2, 3, CR);
    px(-3, -15, 2, 1, CR);
    // Center spike (tallest)
    px(-1, -21, 2, 3, cL);
    px(-1, -19, 2, 4, cL);
    px(-1, -16, 2, 2, CR);
    // Right spike
    px( 3, -18, 2, 2, cL);
    px( 3, -17, 2, 3, CR);
    px( 3, -15, 2, 1, CR);

    // ── EYES (prominent yellow rectangles) ───────────────
    const eY = -11;
    // Dark sockets
    px(-6, eY,     4, 3, K);
    px( 2, eY,     4, 3, K);
    // Yellow fill
    px(-5.5, eY + 0.5, 3, 2, YE);
    px( 2.5, eY + 0.5, 3, 2, YE);
    // Top glint
    ctx.fillStyle = '#fffab0';
    ctx.globalAlpha = 0.65;
    ctx.fillRect(-5.5 * P, (eY + 0.5) * P, 1.5 * P, 0.7 * P);
    ctx.fillRect( 2.5 * P, (eY + 0.5) * P, 1.5 * P, 0.7 * P);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // ── LEADERBOARD ──────────────────────────────────────────
  let cachedScores = {};

  function lsLoad() {
    try { return JSON.parse(localStorage.getItem('mino_runner_lb') || '{}'); } catch { return {}; }
  }
  function lsSave(name, score) {
    const s = lsLoad();
    if (!s[name] || score > s[name]) { s[name] = score; localStorage.setItem('mino_runner_lb', JSON.stringify(s)); }
  }
  async function fetchScores() {
    try {
      const r = await fetch(`/api/scores?game=${LB_KEY_PARAM}`);
      if (!r.ok) throw new Error();
      cachedScores = await r.json();
    } catch { cachedScores = lsLoad(); }
    return cachedScores;
  }
  async function postScore(name, score) {
    lsSave(name, score);
    try {
      const r = await fetch(`/api/scores?game=${LB_KEY_PARAM}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, score })
      });
      if (!r.ok) throw new Error();
      cachedScores = await r.json();
    } catch { cachedScores = lsLoad(); }
    return cachedScores;
  }
  function renderLb(highlight, scores) {
    scores = scores || cachedScores;
    const ranked = PLAYERS
      .map(n => ({ name: n, score: scores[n] || 0 }))
      .sort((a, b) => b.score - a.score);
    const medals = ['gold','silver','bronze'];
    lbList.innerHTML = ranked.map((p, i) => `
      <div class="lb-row ${p.name === highlight ? 'current-player' : ''}">
        <span class="lb-rank ${medals[i]||''}">${i+1}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-score ${p.score===0?'zero':''}">${p.score}</span>
      </div>`).join('');
  }

  // ── PLAYER SELECTION ────────────────────────────────────
  let currentPlayer = null;

  document.getElementById('playerGrid').addEventListener('click', e => {
    const btn = e.target.closest('.player-btn');
    if (!btn) return;
    document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentPlayer = btn.dataset.name;
    startBtn.disabled = false;
    bestDsp.textContent = cachedScores[currentPlayer] || 0;
    renderLb(currentPlayer);
  });

  // ── GAME STATE ───────────────────────────────────────────
  let player, obstacles, score, gameSpeed;
  let running = false, rafId = null;
  let frameCount = 0;
  let nextObstacleIn = 60;
  let jumpCount = 0;
  let keys = {};
  let jumpPressed = false;
  let dustParticles = [];

  function initGame() {
    player = {
      x: PLAYER_X,
      y: GROUND_Y - PLAYER_R,
      vy: 0,
      onGround: true,
      squish: 1,
      squishVel: 0,
      bobAngle: 0,
      ducking: false,
    };
    obstacles     = [];
    dustParticles = [];
    score         = 0;
    gameSpeed     = 4;
    frameCount    = 0;
    nextObstacleIn = 80;
    jumpCount      = 0;
    jumpPressed    = false;
    // Reset bg offsets so city scrolls fresh each run
    farOff = Math.random() * L_FAR.totalW;
    midOff = Math.random() * L_MID.totalW;
    gndOff = 0;
  }

  // ── OBSTACLE TYPES ───────────────────────────────────────
  function spawnObstacle() {
    const roll  = Math.random();
    const speed = gameSpeed;
    if (roll < 0.50) {
      obstacles.push({ x: W + 10, y: GROUND_Y - 38, w: 32, h: 38, speed });
    } else if (roll < 0.75) {
      obstacles.push({ x: W + 10, y: GROUND_Y - 38, w: 32, h: 38, speed });
      obstacles.push({ x: W + 52, y: GROUND_Y - 38, w: 32, h: 38, speed });
    } else {
      obstacles.push({ x: W + 10, y: GROUND_Y - 56, w: 28, h: 56, speed });
    }
  }

  // ── DUST ─────────────────────────────────────────────────
  function spawnDust(x, y) {
    for (let i = 0; i < 6; i++) {
      dustParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 2.5,
        vy: -Math.random() * 2,
        life: 1,
        r: 1 + Math.random() * 2.5,
      });
    }
  }

  // ── JUMP ─────────────────────────────────────────────────
  function doJump() {
    if (!running) return;
    if (jumpCount < 2) {
      player.vy = jumpCount === 0 ? JUMP_VEL : JUMP_VEL * 0.8;
      player.onGround = false;
      jumpCount++;
      spawnDust(player.x, GROUND_Y);
    }
  }

  // ── MAIN LOOP ────────────────────────────────────────────
  function gameLoop(ts) {
    if (!running) return;
    rafId = requestAnimationFrame(gameLoop);
    update();
    draw(ts);
  }

  function update() {
    frameCount++;
    score     = Math.floor(frameCount / 6);
    gameSpeed = Math.min(12, 4 + frameCount * 0.001);

    player.ducking = !!(keys['ArrowDown'] || keys['s']);

    // Gravity + position
    player.vy += GRAVITY;
    player.y  += player.vy;

    const groundHit = GROUND_Y - (player.ducking ? PLAYER_R * 0.6 : PLAYER_R);
    if (player.y >= groundHit) {
      if (!player.onGround) {
        player.squish    = 1.45;
        player.squishVel = -0.09;
        spawnDust(player.x, GROUND_Y);
      }
      player.y        = groundHit;
      player.vy       = 0;
      player.onGround = true;
      jumpCount       = 0;
    } else {
      player.onGround = false;
    }

    player.squish    = Math.max(1, player.squish + player.squishVel);
    player.squishVel *= 0.85;

    if (player.onGround && !player.ducking) player.bobAngle += 0.26;

    // Background scroll
    farOff += gameSpeed * 0.035;
    midOff += gameSpeed * 0.17;
    gndOff += gameSpeed;

    // Obstacles
    nextObstacleIn--;
    if (nextObstacleIn <= 0) {
      spawnObstacle();
      nextObstacleIn = Math.max(40, Math.floor(120 - gameSpeed * 8) + Math.random() * 40);
    }
    obstacles = obstacles.filter(o => { o.x -= o.speed; return o.x + o.w > 0; });

    // Dust
    dustParticles = dustParticles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.055;
      return p.life > 0;
    });

    // Collision (slightly generous hitbox)
    const pr = player.ducking ? PLAYER_R * 0.5 : PLAYER_R * 0.78;
    for (const o of obstacles) {
      if (
        player.x + pr > o.x + 5 &&
        player.x - pr < o.x + o.w - 5 &&
        player.y + pr > o.y + 7 &&
        player.y - pr < o.y + o.h
      ) { endGame(); return; }
    }

    scoreDsp.textContent = score;
    if (speedDsp) speedDsp.textContent = `×${gameSpeed.toFixed(1)}`;
  }

  // ── DRAW ─────────────────────────────────────────────────
  function draw(ts) {
    // Background (sky + buildings + ground)
    drawBackground();

    // Dust particles
    for (const p of dustParticles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(146,237,17,${(p.life * 0.35).toFixed(2)})`;
      ctx.fill();
    }

    // Obstacles (goblins) with bob animation
    for (const o of obstacles) {
      const bob = Math.sin(ts * 0.005 + o.x * 0.04) * 2.5;

      // Glow behind goblin
      const grd = ctx.createRadialGradient(o.x+o.w/2, o.y+o.h/2, 0, o.x+o.w/2, o.y+o.h/2, o.w * 1.2);
      grd.addColorStop(0, 'rgba(146,237,17,0.12)');
      grd.addColorStop(1, 'rgba(146,237,17,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h/2, o.w, o.h*0.8, 0, 0, Math.PI*2); ctx.fill();

      if (gobelinImg.complete && gobelinImg.naturalWidth > 0) {
        ctx.drawImage(gobelinImg, o.x, o.y + bob, o.w, o.h);
      } else {
        ctx.fillStyle = LIME;
        ctx.fillRect(o.x, o.y + bob, o.w, o.h);
      }
    }

    // Player (crab)
    const bodyBob  = player.onGround && !player.ducking ? Math.sin(player.bobAngle * 2) * 1.8 : 0;
    const squishX  = player.ducking ? 1.25 : (2 - player.squish);
    const squishY  = player.ducking ? 0.62 : player.squish;

    drawCreature(player.x, player.y + bodyBob, player.bobAngle, player.ducking, squishX, squishY);

    // HUD: score (top-right)
    ctx.font      = '800 1.7rem Epilogue, sans-serif';
    ctx.fillStyle = 'rgba(146,237,17,0.15)';
    ctx.textAlign = 'right';
    ctx.fillText(score, W - 14, 34);
    ctx.textAlign = 'left';

    // HUD: speed (bottom-left)
    ctx.font      = '700 0.62rem Epilogue, sans-serif';
    ctx.fillStyle = 'rgba(146,237,17,0.22)';
    ctx.fillText(`×${gameSpeed.toFixed(1)}`, 12, H - 10);
  }

  // ── FLOW ─────────────────────────────────────────────────
  function startGame() {
    if (rafId) cancelAnimationFrame(rafId);
    initGame();
    running = true;
    startOvl.classList.add('hidden');
    gameOvl.classList.add('hidden');
    wrap.classList.add('playing');
    avatarImg.src = AVATARS[currentPlayer];
    avatarImg.alt = currentPlayer;
    avatarName.textContent = currentPlayer;
    avatarCard.classList.add('visible');
    rafId = requestAnimationFrame(gameLoop);
  }

  function endGame() {
    running = false;
    cancelAnimationFrame(rafId); rafId = null;
    wrap.classList.remove('playing');
    const prev  = cachedScores[currentPlayer] || 0;
    const isNew = score > prev;
    postScore(currentPlayer, score).then(newScores => {
      renderLb(currentPlayer, newScores);
      bestDsp.textContent = Math.max(score, newScores[currentPlayer] || 0);
    });
    finalScr.textContent = score;
    newRec.classList.toggle('show', isNew);
    gameOvl.classList.remove('hidden');
  }

  function showMenu() {
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    wrap.classList.remove('playing');
    gameOvl.classList.add('hidden');
    startOvl.classList.remove('hidden');
    avatarCard.classList.remove('visible');
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);
  }

  // ── INPUT ────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (!jumpPressed) { doJump(); jumpPressed = true; }
    }
  });
  document.addEventListener('keyup', e => {
    keys[e.key] = false;
    if (e.key === ' ' || e.key === 'ArrowUp') jumpPressed = false;
  });

  let touchY0 = null;
  document.addEventListener('touchstart', e => {
    touchY0 = e.touches[0].clientY;
    if (!jumpPressed) { doJump(); jumpPressed = true; }
  }, {passive:true});
  document.addEventListener('touchend', () => {
    jumpPressed = false;
    keys['ArrowDown'] = false;
    touchY0 = null;
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if (touchY0 !== null && e.touches[0].clientY - touchY0 > 30) keys['ArrowDown'] = true;
  }, {passive:true});

  startBtn.addEventListener('click', startGame);
  restBtn.addEventListener('click',  startGame);
  menuBtn.addEventListener('click',  showMenu);

  // ── BOOT ─────────────────────────────────────────────────
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, W, H);
  fetchScores().then(s => renderLb(null, s));
</script>
</body>
</html>
