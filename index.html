<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE — Mino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime:   #92ED11;
      --black:  #171915;
      --gray:   #6b6e69;
      --white:  #eaeaea;
      --dark:   #1f221d;
      --border: #2a2d28;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Epilogue', sans-serif;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 24px 32px;
      gap: 20px;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img { height: 36px; width: auto; display: block; }

    .tagline {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── MAIN ───────────────────────────────── */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    /* ── SIDEBARS ───────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 180px;
    }

    .card {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 18px 20px;
    }

    .card-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 6px;
    }

    .card-value {
      font-family: 'Epilogue', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--lime);
      line-height: 1;
    }

    .card-value.small { font-size: 1.3rem; }

    .speed-indicator { display: flex; gap: 4px; margin-top: 4px; }
    .speed-dot { width: 6px; height: 6px; background: var(--border); transition: background 0.3s; }
    .speed-dot.active { background: var(--lime); }

    /* ── LEADERBOARD ────────────────────────── */
    .lb-card {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 18px 20px;
      flex: 1;
    }

    .lb-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .lb-row:last-child { border-bottom: none; }

    .lb-rank {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gray);
      width: 18px;
    }

    .lb-rank.gold   { color: #FFD700; }
    .lb-rank.silver { color: #C0C0C0; }
    .lb-rank.bronze { color: #CD7F32; }

    .lb-name {
      flex: 1;
      padding: 0 8px;
      font-weight: 400;
      color: var(--white);
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-row.current-player .lb-name { color: var(--lime); font-weight: 700; }

    .lb-score {
      font-family: 'Epilogue', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--lime);
      min-width: 28px;
      text-align: right;
    }

    .lb-score.zero { color: var(--gray); font-weight: 400; }

    /* ── CANVAS ─────────────────────────────── */
    .canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      line-height: 0;
    }

    .canvas-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid transparent;
      pointer-events: none;
      transition: border-color 0.3s;
    }

    .canvas-wrap.playing::before { border-color: var(--lime); }

    canvas { display: block; }

    /* ── OVERLAY ────────────────────────────── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,10,0.94);
      text-align: center;
      padding: 28px;
      transition: opacity 0.4s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-family: 'Epilogue', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 6px;
    }

    .overlay-title span { color: var(--lime); }

    .overlay-sub {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 24px;
    }

    /* ── PLAYER PICKER ──────────────────────── */
    .player-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 320px;
    }

    .player-btn {
      padding: 10px 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gray);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .player-btn:hover { border-color: var(--lime); color: var(--white); }

    .player-btn.selected {
      background: var(--lime);
      border-color: var(--lime);
      color: var(--black);
    }

    /* ── BUTTONS ────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--lime);
      color: var(--black);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }

    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.3; cursor: default; }

    .btn-ghost {
      background: transparent;
      color: var(--lime);
      border: 1px solid var(--lime);
      margin-top: 10px;
    }

    .btn-ghost:hover:not(:disabled) { background: rgba(146,237,17,0.08); }

    .score-result {
      margin-bottom: 20px;
      padding: 14px 28px;
      border: 1px solid var(--border);
    }

    .score-result .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .score-result .val {
      font-family: 'Epilogue', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--lime);
      line-height: 1;
    }

    .new-record {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--lime);
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .new-record.show { opacity: 1; }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .footer-text {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .footer-dot {
      width: 6px; height: 6px;
      background: var(--lime);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── FLASH ──────────────────────────────── */
    @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 0; } }

    .flash {
      position: absolute;
      inset: 0;
      background: var(--lime);
      pointer-events: none;
      opacity: 0;
    }

    .flash.go { animation: flash 0.15s ease-out forwards; }
  </style>
</head>
<body>

<div class="layout">

  <header>
    <div class="logo"><img src="LOGO_MINO_VERT.png" alt="Mino" /></div>
    <div class="tagline">Crafting Connections — Shaping Experiences</div>
  </header>

  <div class="main">

    <!-- SIDEBAR LEFT -->
    <div class="sidebar">
      <div class="card">
        <div class="card-label">Score</div>
        <div class="card-value" id="scoreDisplay">0</div>
      </div>
      <div class="card">
        <div class="card-label">Record</div>
        <div class="card-value small" id="bestDisplay">0</div>
      </div>
      <div class="card">
        <div class="card-label">Vitesse</div>
        <div class="speed-indicator" id="speedDots">
          <div class="speed-dot active"></div>
          <div class="speed-dot"></div>
          <div class="speed-dot"></div>
          <div class="speed-dot"></div>
          <div class="speed-dot"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Longueur</div>
        <div class="card-value small" id="lengthDisplay">3</div>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
      <div class="flash" id="flash"></div>

      <!-- START OVERLAY -->
      <div class="overlay" id="startOverlay">
        <div class="overlay-title">SNA<span>KE</span></div>
        <div class="overlay-sub">Choisis ton joueur</div>
        <div class="player-grid" id="playerGrid">
          <button class="player-btn" data-name="Aminata">Aminata</button>
          <button class="player-btn" data-name="Inès">Inès</button>
          <button class="player-btn" data-name="Maé">Maé</button>
          <button class="player-btn" data-name="Luna">Luna</button>
          <button class="player-btn" data-name="Bastien">Bastien</button>
          <button class="player-btn" data-name="Anatole">Anatole</button>
        </div>
        <button class="btn" id="startBtn" disabled>Jouer →</button>
      </div>

      <!-- GAME OVER OVERLAY -->
      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-title" style="font-size:1.8rem; margin-bottom:6px;">GAME<span> OVER</span></div>
        <div class="overlay-sub" id="gameOverSub">Le serpent a mordu</div>
        <div class="score-result">
          <div class="label">Score final</div>
          <div class="val" id="finalScore">0</div>
          <div class="new-record" id="newRecord">★ Nouveau record</div>
        </div>
        <button class="btn" id="restartBtn">Rejouer →</button>
        <button class="btn btn-ghost" id="menuBtn">Menu</button>
      </div>
    </div>

    <!-- SIDEBAR RIGHT — LEADERBOARD -->
    <div class="sidebar">
      <div class="lb-card">
        <div class="card-label">Leaderboard</div>
        <div id="lbList"></div>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-text">© 2026 Mino Creative Studio</div>
    <div class="footer-dot"></div>
    <div class="footer-text">All rights reserved</div>
  </footer>

</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const CELL       = 20;
  const COLS       = 25;
  const ROWS       = 25;
  const W          = COLS * CELL;
  const H          = ROWS * CELL;
  const BASE_SPEED = 130;
  const SPEED_INC  = 10;
  const LEVEL_STEP = 5;

  const LIME   = '#92ED11';
  const BLACK  = '#171915';
  const BORDER = '#2a2d28';

  const PLAYERS = ['Aminata', 'Inès', 'Maé', 'Luna', 'Bastien', 'Anatole'];

  // ── DOM ─────────────────────────────────────────────────
  const canvas      = document.getElementById('gameCanvas');
  const ctx         = canvas.getContext('2d');
  const wrap        = document.getElementById('canvasWrap');
  const startOvl    = document.getElementById('startOverlay');
  const gameOvl     = document.getElementById('gameOverOverlay');
  const startBtn    = document.getElementById('startBtn');
  const restBtn     = document.getElementById('restartBtn');
  const menuBtn     = document.getElementById('menuBtn');
  const scoreDsp    = document.getElementById('scoreDisplay');
  const bestDsp     = document.getElementById('bestDisplay');
  const finalScr    = document.getElementById('finalScore');
  const lengthDsp   = document.getElementById('lengthDisplay');
  const newRec      = document.getElementById('newRecord');
  const flashEl     = document.getElementById('flash');
  const speedDots   = document.getElementById('speedDots').querySelectorAll('.speed-dot');
  const lbList      = document.getElementById('lbList');
  const gameOverSub = document.getElementById('gameOverSub');

  canvas.width  = W;
  canvas.height = H;

  // ── LEADERBOARD STORAGE ──────────────────────────────────
  function loadScores() {
    try {
      return JSON.parse(localStorage.getItem('mino_lb') || '{}');
    } catch { return {}; }
  }

  function saveScore(name, score) {
    const scores = loadScores();
    if (!scores[name] || score > scores[name]) scores[name] = score;
    localStorage.setItem('mino_lb', JSON.stringify(scores));
  }

  function renderLeaderboard(highlightName) {
    const scores = loadScores();
    const ranked = PLAYERS
      .map(name => ({ name, score: scores[name] || 0 }))
      .sort((a, b) => b.score - a.score);

    const medals = ['gold', 'silver', 'bronze'];

    lbList.innerHTML = ranked.map((p, i) => `
      <div class="lb-row ${p.name === highlightName ? 'current-player' : ''}">
        <span class="lb-rank ${medals[i] || ''}">${i + 1}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-score ${p.score === 0 ? 'zero' : ''}">${p.score}</span>
      </div>
    `).join('');
  }

  // ── PLAYER SELECTION ─────────────────────────────────────
  let currentPlayer = null;

  document.getElementById('playerGrid').addEventListener('click', e => {
    const btn = e.target.closest('.player-btn');
    if (!btn) return;
    document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentPlayer = btn.dataset.name;
    startBtn.disabled = false;
    renderLeaderboard(currentPlayer);
    // Update personal best display
    const scores = loadScores();
    bestDsp.textContent = scores[currentPlayer] || 0;
  });

  // ── STATE ────────────────────────────────────────────────
  let snake, dir, nextDir, food, score;
  let running  = false;
  let paused   = false;
  let rafId    = null;
  let lastTick = 0;

  function getInterval() {
    const level = Math.floor(score / LEVEL_STEP);
    return Math.max(50, BASE_SPEED - level * SPEED_INC);
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function init() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snake   = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
    dir     = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score   = 0;
    paused  = false;
    placeFood();
    updateUI();
  }

  // ── TICK ─────────────────────────────────────────────────
  function tick() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision → game over
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame('Mur touché !');
      return;
    }

    // Self collision → game over
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame('Le serpent a mordu');
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      placeFood();
      triggerFlash();
    } else {
      snake.pop();
    }

    updateUI();
  }

  // ── RENDER LOOP ──────────────────────────────────────────
  function renderLoop(timestamp) {
    if (!running) return;
    rafId = requestAnimationFrame(renderLoop);
    if (!paused && timestamp - lastTick >= getInterval()) {
      lastTick = timestamp;
      tick();
      if (!running) return;
    }
    draw(timestamp);
  }

  // ── DRAW ─────────────────────────────────────────────────
  function draw(timestamp) {
    const t = (timestamp || performance.now()) / 600;

    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = BORDER;
    ctx.lineWidth = 0.4;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke();
    }

    // Food
    const pulse = 0.7 + 0.3 * Math.sin(t * Math.PI * 2);
    const fr = (CELL/2 - 3) * pulse;
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;

    const grd = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL);
    grd.addColorStop(0, 'rgba(146,237,17,0.25)');
    grd.addColorStop(1, 'rgba(146,237,17,0)');
    ctx.beginPath(); ctx.arc(fx, fy, CELL, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI*2);
    ctx.fillStyle = LIME; ctx.fill();

    // Snake
    const len = snake.length;
    snake.forEach((seg, i) => {
      const alpha = 1 - (i / len) * 0.55;
      const px = seg.x * CELL + 1;
      const py = seg.y * CELL + 1;
      const sz = CELL - 2;

      if (i === 0) {
        ctx.fillStyle = LIME;
        ctx.fillRect(px, py, sz, sz);
        ctx.fillStyle = BLACK;
        const e = 3;
        if      (dir.x === 1)  { ctx.fillRect(px+sz-6, py+3, e, e); ctx.fillRect(px+sz-6, py+sz-6, e, e); }
        else if (dir.x === -1) { ctx.fillRect(px+3,    py+3, e, e); ctx.fillRect(px+3,    py+sz-6, e, e); }
        else if (dir.y === 1)  { ctx.fillRect(px+3, py+sz-6, e, e); ctx.fillRect(px+sz-6, py+sz-6, e, e); }
        else                   { ctx.fillRect(px+3,    py+3, e, e); ctx.fillRect(px+sz-6, py+3,    e, e); }
      } else {
        ctx.fillStyle = `rgba(146,237,17,${alpha.toFixed(2)})`;
        const pad = Math.min(Math.round((i / len) * 3), 3);
        ctx.fillRect(px+pad, py+pad, sz-pad*2, sz-pad*2);
      }
    });
  }

  // ── UI ───────────────────────────────────────────────────
  function updateUI() {
    scoreDsp.textContent = score;
    lengthDsp.textContent = snake.length;
    const level = Math.floor(score / LEVEL_STEP);
    speedDots.forEach((dot, i) => dot.classList.toggle('active', i <= Math.min(level, 4)));
  }

  function triggerFlash() {
    flashEl.classList.remove('go');
    void flashEl.offsetWidth;
    flashEl.classList.add('go');
  }

  // ── FLOW ─────────────────────────────────────────────────
  function startGame() {
    if (rafId) cancelAnimationFrame(rafId);
    init();
    running  = true;
    lastTick = 0;
    startOvl.classList.add('hidden');
    gameOvl.classList.add('hidden');
    wrap.classList.add('playing');
    rafId = requestAnimationFrame(renderLoop);
  }

  function endGame(reason) {
    running = false;
    cancelAnimationFrame(rafId);
    rafId = null;
    wrap.classList.remove('playing');

    // Save score to leaderboard
    const scores = loadScores();
    const prev   = scores[currentPlayer] || 0;
    const isNew  = score > prev;
    saveScore(currentPlayer, score);
    renderLeaderboard(currentPlayer);

    // Update personal best display
    bestDsp.textContent = Math.max(score, prev);

    gameOverSub.textContent = reason || 'Game Over';
    finalScr.textContent = score;
    newRec.classList.toggle('show', isNew);
    gameOvl.classList.remove('hidden');
  }

  function showMenu() {
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    wrap.classList.remove('playing');
    gameOvl.classList.add('hidden');
    startOvl.classList.remove('hidden');
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (!paused) lastTick = performance.now();
  }

  // ── INPUT ────────────────────────────────────────────────
  const DIR_MAP = {
    ArrowUp:    {x:0,y:-1}, ArrowDown:  {x:0,y:1},
    ArrowLeft:  {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  };

  document.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); togglePause(); return; }
    const d = DIR_MAP[e.key];
    if (!d) return;
    e.preventDefault();
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  });

  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, {passive: true});

  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) > Math.abs(dy)) {
      const d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
      if (d.x !== -dir.x) nextDir = d;
    } else {
      const d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
      if (d.y !== -dir.y) nextDir = d;
    }
  }, {passive: true});

  startBtn.addEventListener('click', startGame);
  restBtn.addEventListener('click', startGame);
  menuBtn.addEventListener('click', showMenu);

  // ── INIT ────────────────────────────────────────────────
  renderLeaderboard(null);
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
